<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Matchmaker | Structural EOA Analysis</title>
    <script src="https://unpkg.com/force-graph"></script>
    <style>
      /* IDE-like Global Styles */
      body {
        font-family:
          "Inter",
          -apple-system,
          sans-serif;
        margin: 0;
        padding: 0;
        background: #0d1117;
        color: #c9d1d9;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* Left Sidebar: Controls & Stats */
      .sidebar {
        width: 380px;
        flex-shrink: 0;
        background: #161b22;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        border-right: 1px solid #30363d;
        z-index: 10;
        overflow-y: auto;
        box-sizing: border-box;
      }

      h1 {
        margin: 0;
        font-size: 1.2rem;
        color: #e6edf3;
        font-weight: 600;
        letter-spacing: 0.5px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .badge {
        font-size: 0.7rem;
        background: #1f6feb;
        color: white;
        padding: 2px 6px;
        border-radius: 3px;
        text-transform: uppercase;
        font-weight: bold;
      }

      label {
        font-size: 0.75rem;
        color: #8b949e;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-top: 5px;
        margin-bottom: -5px;
      }

      /* Console-style Textarea */
      textarea {
        height: 220px;
        flex-shrink: 0;
        font-family: "JetBrains Mono", "Courier New", monospace;
        background: #010409;
        color: #e6edf3;
        border: 1px solid #30363d;
        padding: 12px;
        border-radius: 3px;
        resize: vertical;
        font-size: 13px;
        box-sizing: border-box;
        outline: none;
        line-height: 1.4;
      }
      textarea:focus {
        border-color: #58a6ff;
      }

      /* Utility Button Styling */
      .btn-group {
        display: flex;
        gap: 8px;
      }
      button {
        flex: 1;
        background: #238636;
        color: #ffffff;
        border: 1px solid rgba(240, 246, 252, 0.1);
        padding: 10px;
        border-radius: 3px;
        cursor: pointer;
        font-weight: 600;
        font-size: 13px;
        transition: background 0.2s;
      }
      button:hover {
        background: #2ea043;
      }
      button.secondary {
        background: #21262d;
        border-color: #30363d;
        color: #c9d1d9;
      }
      button.secondary:hover {
        background: #30363d;
        border-color: #8b949e;
      }

      /* Terminal-like Results Box */
      .results-box {
        flex-grow: 1;
        background: #010409;
        border: 1px solid #30363d;
        border-radius: 3px;
        padding: 12px;
        overflow-y: auto;
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 12px;
        color: #8b949e;
        white-space: pre-wrap;
        margin: 0;
        line-height: 1.5;
        min-height: 120px;
      }

      /* Footer */
      .footer {
        margin-top: auto;
        padding-top: 15px;
        border-top: 1px dashed #30363d;
        font-size: 0.75rem;
        color: #8b949e;
        text-align: center;
        line-height: 1.6;
        font-family: "JetBrains Mono", monospace;
      }
      .footer a {
        color: #58a6ff;
        text-decoration: none;
        transition: color 0.2s;
      }
      .footer a:hover {
        text-decoration: underline;
      }

      /* Center Content: Spiderman Graph */
      .main-content {
        flex-grow: 1;
        position: relative;
        background: #0d1117;
      }
      #graph {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }

      /* Right Sidebar: Collapsible Token Stream */
      .tokens-panel {
        width: 280px;
        flex-shrink: 0;
        background: #161b22;
        border-left: 1px solid #30363d;
        display: flex;
        flex-direction: column;
        box-sizing: border-box;
        z-index: 10;
        transition:
          width 0.3s ease,
          padding 0.3s ease,
          opacity 0.2s ease,
          height 0.3s ease;
        overflow: hidden;
        padding: 20px;
      }
      .tokens-panel.collapsed {
        width: 0;
        padding-left: 0;
        padding-right: 0;
        border-left: none;
        opacity: 0;
      }

      .tokens-panel h2 {
        margin: 0 0 12px 0;
        font-size: 0.85rem;
        color: #8b949e;
        border-bottom: 1px solid #30363d;
        padding-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        white-space: nowrap;
      }

      .tokens-list {
        flex-grow: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding-right: 5px;
      }

      /* IDE Token Highlighting */
      .token-item {
        background: #010409;
        border: 1px solid #30363d;
        padding: 6px 10px;
        border-radius: 3px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 11px;
        white-space: nowrap;
      }
      .token-type {
        color: #8b949e;
        font-weight: normal;
      }
      .token-value {
        color: #79c0ff;
        font-weight: 600;
        text-align: right;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 120px;
      }

      /* Custom scrollbars */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #30363d;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #484f58;
      }

      .success {
        color: #3fb950;
        font-weight: bold;
      }
      .warning {
        color: #f85149;
        font-weight: bold;
      }
      .highlight {
        color: #d2a8ff;
      }
      .template-select {
        background: #010409;
        color: #e6edf3;
        border: 1px solid #30363d;
        padding: 8px;
        border-radius: 3px;
        font-family: "JetBrains Mono", "Courier New", monospace;
        font-size: 12px;
        margin-bottom: 10px;
        outline: none;
        cursor: pointer;
      }
      .template-select:focus {
        border-color: #58a6ff;
      }

      /* MOBILE RESPONSIVENESS */
      @media (max-width: 800px) {
        body {
          flex-direction: column;
          overflow-y: auto;
        }
        .sidebar {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid #30363d;
          flex-shrink: 0;
        }
        .main-content {
          width: 100%;
          height: 60vh; /* Fixed viewport chunk for the graph on mobile */
          flex-shrink: 0;
        }
        .tokens-panel {
          width: 100%;
          border-left: none;
          border-top: 1px solid #30363d;
          height: 300px;
          flex-shrink: 0;
        }
        .tokens-panel.collapsed {
          height: 0;
          padding: 0;
          border: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="sidebar">
      <h1>Matchmaker <span class="badge">Engine</span></h1>

      <label for="exampleSelect">Load Template</label>
      <select id="exampleSelect" class="template-select">
        <option value="demo">Simple Demo</option>
        <option value="evaporator">Single Evaporator (PhD Model)</option>
        <option value="flash">Flash Drum Separation</option>
      </select>

      <label for="equationsInput">System Definition</label>
      <textarea id="equationsInput" spellcheck="false">
{mass_balance} 2.34 = cos(t) - log(x/y)
{ratio} t/x = 23
{spec} t = 2
      </textarea>

      <div class="btn-group">
        <button id="analyzeBtn">Compile & Match</button>
        <button id="toggleTokensBtn" class="secondary">Toggle Tokens</button>
      </div>

      <label>Diagnostic Output</label>
      <pre class="results-box" id="textOutput">
Waiting for WASM execution environment...</pre
      >

      <div class="footer">
        Built by Marcio R. V. Neto<br />
        Powered by
        <a href="https://voimatoolbox.com/en-beta" target="_blank"
          >Voima Toolbox</a
        ><br />
        <a href="https://github.com/marciorvneto/matchmaker" target="_blank"
          >GitHub Repo</a
        >
        &bull; <a href="mailto:marcio@voimatoolbox.com">Contact</a>
      </div>
    </div>

    <div class="main-content">
      <div id="graph"></div>
    </div>

    <div class="tokens-panel" id="tokensPanel">
      <h2>Lexical Stream</h2>
      <div class="tokens-list" id="tokenList"></div>
    </div>

    <script type="module">
      import { TEMPLATES } from "./templates.js";
      import loadWASM from "./matchmaker.js"; // Import the C engine as a module!

      const TOKEN_TYPES = [
        "NUMBER",
        "IDENTIFIER",
        "PLUS",
        "MINUS",
        "STAR",
        "SLASH",
        "CARET",
        "LPAREN",
        "RPAREN",
        "LCURLY",
        "RCURLY",
        "COMMA",
        "EQUALS",
        "NEWLINE",
        "END",
      ];

      let Graph = null;

      // Toggle Token Panel Logic
      document
        .getElementById("toggleTokensBtn")
        .addEventListener("click", () => {
          const panel = document.getElementById("tokensPanel");
          panel.classList.toggle("collapsed");
          setTimeout(() => {
            if (Graph) {
              const graphElem = document.getElementById("graph");
              Graph.width(graphElem.clientWidth).height(graphElem.clientHeight);
            }
          }, 300);
        });

      // Predefined systems logic
      document
        .getElementById("exampleSelect")
        .addEventListener("change", (e) => {
          const templateKey = e.target.value;
          document.getElementById("equationsInput").value =
            TEMPLATES[templateKey];
          document.getElementById("analyzeBtn").click();
        });

      // --- The Modern Async WASM Initialization ---
      async function initializeApp() {
        try {
          // Await the WebAssembly compilation natively! No race conditions.
          const Module = await loadWASM();
          const analyzeSystem = Module.cwrap("analyze_system", "string", [
            "string",
          ]);

          document
            .getElementById("analyzeBtn")
            .addEventListener("click", () => {
              const equations = document.getElementById("equationsInput").value;
              if (!equations.trim()) return;

              const rawJson = analyzeSystem(equations);
              const data = JSON.parse(rawJson);

              // Populate Token Stream
              const tokenList = document.getElementById("tokenList");
              tokenList.innerHTML = "";
              data.tokens.forEach((t) => {
                const div = document.createElement("div");
                div.className = "token-item";

                let displayValue = t.value;
                if (t.type === 13) displayValue = "\\n";
                if (t.type === 14) displayValue = "EOF";

                div.innerHTML = `
                <span class="token-type">${TOKEN_TYPES[t.type]}</span>
                <span class="token-value">${displayValue}</span>
              `;
                tokenList.appendChild(div);
              });

              // Format Console Output
              let out = `--- KERNEL ANALYSIS ---\n`;
              out += `EQN_COUNT : <span class="highlight">${data.stats.equations}</span>\n`;
              out += `VAR_COUNT : <span class="highlight">${data.stats.variables}</span>\n\n`;

              out += "--- INCIDENCE MATCHING ---\n";
              data.matches.forEach((m) => {
                out += `[${m.equation}] -> ${m.variable}\n`;
              });

              if (data.stats.well_posed) {
                out += `\n<span class="success">[SYS_OK] Structural degrees of freedom = 0.</span>`;
              } else {
                out += `\n<span class="warning">[SYS_ERR] Matrix is structurally singular.</span>`;
              }
              document.getElementById("textOutput").innerHTML = out;

              // Render Technical Spiderman Graph
              const graphElem = document.getElementById("graph");
              if (!Graph) {
                Graph = ForceGraph()(graphElem)
                  .width(graphElem.clientWidth)
                  .height(graphElem.clientHeight)
                  .nodeId("id")
                  .backgroundColor("#0d1117")
                  .linkColor((link) => (link.is_match ? "#3fb950" : "#30363d"))
                  .linkWidth((link) => (link.is_match ? 2 : 1))
                  .linkDirectionalParticles((link) => (link.is_match ? 3 : 0))
                  .linkDirectionalParticleSpeed(0.008)
                  .nodeCanvasObject((node, ctx, globalScale) => {
                    const label = node.name;
                    const fontSize = 16 / globalScale;
                    ctx.font = `${fontSize}px 'JetBrains Mono', monospace`;

                    ctx.fillStyle =
                      node.group === "equation" ? "#58a6ff" : "#f78166";
                    ctx.beginPath();
                    if (node.group === "equation") {
                      const size = 5;
                      ctx.rect(
                        node.x - size / 2,
                        node.y - size / 2,
                        size,
                        size,
                      );
                    } else {
                      ctx.arc(node.x, node.y, 2.5, 0, 2 * Math.PI, false);
                    }
                    ctx.fill();

                    ctx.textAlign = "center";
                    ctx.textBaseline = "top";
                    ctx.fillStyle = "#8b949e";
                    ctx.fillText(label, node.x, node.y + 4);
                  });
              }

              Graph.graphData({ nodes: data.nodes, links: data.links });
            });

          // Everything is wired up, run the first analysis!
          document.getElementById("analyzeBtn").click();
        } catch (err) {
          console.error("Failed to load WASM Engine:", err);
          document.getElementById("textOutput").innerHTML =
            `<span class="warning">FATAL: Failed to initialize WebAssembly kernel.</span>`;
        }
      }

      // Boot the app
      initializeApp();

      window.addEventListener("resize", () => {
        if (Graph) {
          const graphElem = document.getElementById("graph");
          Graph.width(graphElem.clientWidth).height(graphElem.clientHeight);
        }
      });
    </script>
  </body>
</html>
